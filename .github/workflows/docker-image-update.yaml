name: "Rebuild image and push to dockerhub"

on:
  push:
    branches: 
      - main
    paths:
      - 'transcoder/**'

jobs:
  cicd:
    name: build app
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: build go app 2
        run: go build -ldflags="-s -w" -buildvcs=false -o transcoder ./transcoder

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      # - name: Build and push
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: true
      #     tags: nikhilesh002/mooz-transcoder:latest
  
      - name: Build and push
        run: |
            cd transcoder   # working dir not persisted
            docker build -t nikhilesh002/mooz-transcoder:latest .
            docker push nikhilesh002/mooz-transcoder:latest